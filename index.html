  <style>
    :root{--bg1:#03050d;--bg2:#06102a;--card:rgba(10,16,38,.76);--border:rgba(122,163,255,.18);--text:#eef4ff;--muted:#a9b7e5;--p:#3a7bff;--s:#8f42ff}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%}
    body{font-family:Inter,sans-serif;color:var(--text);background:radial-gradient(circle at 15% 15%, rgba(58,123,255,.25), transparent 22%),radial-gradient(circle at 85% 10%, rgba(143,66,255,.18), transparent 18%),radial-gradient(circle at 50% 100%, rgba(58,123,255,.12), transparent 28%),linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%)}
    .wrap{min-height:100dvh;display:grid;place-items:center;padding:18px}
    .card{width:min(100%,468px);background:linear-gradient(180deg, rgba(14,22,48,.86), rgba(8,13,30,.84));border:1px solid var(--border);border-radius:32px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.45);backdrop-filter:blur(18px)}
    .top{padding:24px 24px 12px;text-align:center}
    .logo{width:112px;height:112px;border-radius:50%;object-fit:cover;border:4px solid rgba(12,18,40,.98);box-shadow:0 14px 28px rgba(0,0,0,.38);background:#0c1230}
    .brand{margin:16px 0 10px;font-family:Orbitron,sans-serif;font-size:clamp(1.6rem,4.6vw,2.15rem);letter-spacing:.14em;text-transform:uppercase;font-weight:800;line-height:1.05}
    .subtitle{margin:0 auto;max-width:34ch;color:var(--muted);font-size:1rem;line-height:1.7}
    .links{padding:20px 20px 24px;display:grid;gap:12px}
    .btn{display:flex;align-items:center;justify-content:space-between;gap:14px;text-decoration:none;color:var(--text);padding:16px 16px;border-radius:18px;background:linear-gradient(180deg, rgba(17,26,58,.96), rgba(10,16,36,.98));border:1px solid rgba(122,163,255,.16);box-shadow:0 10px 24px rgba(0,0,0,.16);transition:.2s ease}
    .btn:hover{transform:translateY(-2px);border-color:rgba(145,181,255,.42);box-shadow:0 16px 30px rgba(0,0,0,.24)}
    .l{display:flex;align-items:center;gap:14px;text-align:left}.i{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg, rgba(58,123,255,.20), rgba(143,66,255,.22));border:1px solid rgba(127,166,255,.20);flex:0 0 auto}.i svg{width:20px;height:20px}.t{font-weight:800;letter-spacing:.01em}.s{color:var(--muted);font-size:.88rem;margin-top:2px}.a{font-size:1.15rem;color:#d8e4ff}.footer{padding:16px 22px 22px;color:var(--muted);font-size:.83rem;text-align:center;border-top:1px solid rgba(255,255,255,.05);background:rgba(5,9,24,.40)}
    @media (max-width:520px){.wrap{padding:12px}.card{border-radius:26px}.top{padding:20px 16px 10px}.logo{width:102px;height:102px}.links{padding:16px 14px 20px}.btn{padding:15px 14px;border-radius:16px}.t{font-size:.98rem}.s{font-size:.84rem}}
  </style>
</head>
